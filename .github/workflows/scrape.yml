name: scrape

on:
  schedule:
    # Default: 1 vez/dia a las 06:00 UTC (03:00 ART).
    - cron: '0 6 * * *'
    # Inscripciones (descomentar la semana que arranca, comentar el de arriba):
    # - cron: '0 6,14,22 * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - run: pip install -r backend/requirements.txt

      - name: Run scraper
        working-directory: backend
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SCRAPER_DELAY_SECONDS: "0.5"
          SCRAPER_USER_AGENT: "OrganizacionHorarios/1.0 (github actions)"
        run: python -m scraper.main
